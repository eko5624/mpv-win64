name: vulkan
defaults:
  run:
    shell: D:\msys64\msys2.cmd {0}
on:
  workflow_dispatch:
  #schedule:
  #- cron: '30 0 * * MON'
    
jobs:
  vulkan:
    runs-on: windows-2022
    steps:   
    - name: Prepare
      run: git config --global core.autocrlf input
      shell: bash
    - name: Checkout
      uses: actions/checkout@main
    - name: Cache msys2
      uses: actions/cache@main
      with:
        path: D:\msys64
        key: msys2
    - name: Cache clang
      uses: actions/cache@main
      with:
        path: D:\clang64
        key: clang-ucrt-x86_64
    - name: Build
      env:
        MSYSTEM: CLANG64
      run: cd vulkan-dev; makepkg-own -sLf
    - name: Release
      env:
        GH_TOKEN: ${{ github.token }}    
      shell: bash 
      run: |
        ./release-dev.sh vulkan-dev vulkan-dev
